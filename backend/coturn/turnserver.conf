# Backroom coturn (TURN/STUN) Configuration
# Documentation: https://github.com/coturn/coturn/wiki/turnserver

# ============================================
# NETWORK
# ============================================

# STUN/TURN listener port
listening-port=3478

# TLS listener port (for TURNS)
tls-listening-port=5349

# Alternative port (some networks block 3478)
alt-listening-port=3479

# Relay ports range (UDP)
min-port=49152
max-port=65535

# External IP (REQUIRED for production - set via env or replace)
# For Docker, this should be the host's public IP
# external-ip=YOUR_PUBLIC_IP

# Realm (domain name for authentication)
realm=backroom.local

# ============================================
# AUTHENTICATION
# ============================================

# Use long-term credential mechanism
lt-cred-mech

# Static user for development (username:password)
# In production, use REST API for ephemeral credentials
user=backroom:backroom_turn_secret

# Shared secret for REST API credential generation (time-limited)
# This allows the signaling server to generate short-lived TURN credentials
# Generate with: openssl rand -hex 32
use-auth-secret
static-auth-secret=CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET

# ============================================
# SECURITY
# ============================================

# Fingerprint for messages
fingerprint

# Disable weak algorithms
no-sslv3
no-tlsv1
no-tlsv1_1

# Deny specific IP ranges from being relayed to (security)
# Prevents relaying to private networks
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=64:ff9b::-64:ff9b::ffff:ffff
denied-peer-ip=::ffff:0.0.0.0-::ffff:255.255.255.255
denied-peer-ip=100::-100::ffff:ffff:ffff:ffff
denied-peer-ip=2001::-2001:1ff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=2002::-2002:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# ============================================
# PERFORMANCE
# ============================================

# Number of relay threads (0 = auto based on CPU cores)
relay-threads=0

# Max allocations per user
user-quota=12

# Total allocation quota
total-quota=1200

# ============================================
# LOGGING
# ============================================

# Verbose logging (disable in production for performance)
verbose

# Log file (Docker will use stdout)
# log-file=/var/log/turnserver.log

# Don't log sessions (privacy)
no-stdout-log

# ============================================
# MISC
# ============================================

# Process user (for non-Docker deployments)
# proc-user=turnserver
# proc-group=turnserver

# Mobility (for mobile clients that change IPs)
mobility

# Enable STUN only (no TURN relay) - useful for testing
# stun-only

# Server name
server-name=backroom-turn

# CLI for admin (optional, disabled by default)
# cli-ip=127.0.0.1
# cli-port=5766
# cli-password=admin

